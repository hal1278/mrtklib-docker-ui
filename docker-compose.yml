services:
  mrtklib-web-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        MRTKLIB_VERSION: ${MRTKLIB_VERSION:-0.0.0}
    ports:
      - "8080:8000"
    volumes:
      # Output files, presets, configs (read-write)
      - ${WORKSPACE_DIR:-./workspace}:/workspace:rw
      # Input GNSS data files (read-only)
      - ${DATA_DIR:-./data}:/data:ro
      # Optional: mount host .netrc for data download credentials
      # - ${NETRC_FILE:-/dev/null}:/root/.netrc:ro
      # Optional: bind mount for serial devices (uncomment if needed)
      # - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      - PYTHONUNBUFFERED=1
      - EARTHDATA_USER=${EARTHDATA_USER:-}
      - EARTHDATA_PASSWORD=${EARTHDATA_PASSWORD:-}
      - GSI_USER=${GSI_USER:-}
      - GSI_PASSWORD=${GSI_PASSWORD:-}
    # Device access for serial ports (uncomment if needed)
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyACM0:/dev/ttyACM0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
